@if (showLoader()) {
  <app-wake-loader [asleep]="!wake.ready()" (done)="showLoader.set(false)" />
}

<header class="site-header">
  <div class="container header-inner">
    <a routerLink="/home" class="logo">RentAdvisor<span>.</span></a>
    <nav>
      <a routerLink="/compare" routerLinkActive="active">Compare</a>
      <a routerLink="/upload" routerLinkActive="active">Upload Lease</a>
      @if (auth.isLoggedIn()) {
        <a routerLink="/my-leases" routerLinkActive="active">My Leases</a>
        <a (click)="auth.logout()">Logout</a>
      } @else {
        <a routerLink="/login" routerLinkActive="active">Login</a>
        <a routerLink="/register" routerLinkActive="active">Register</a>
      }
    </nav>
  </div>
</header>

<main #outlet class="site-main">
  <router-outlet (activate)="onActivate()" />
</main>

<footer class="site-footer">
  <div class="container footer-inner">
    <span>RentAdvisor — built for the Australian rental market</span>
    <span class="footer-dim">Demo prototype · not financial or legal advice</span>
  </div>
</footer>
